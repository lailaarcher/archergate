name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: archergate-license-windows-x86_64
            ext: .exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: archergate-license-linux-x86_64
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: archergate-license-macos-x86_64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: archergate-license-macos-aarch64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release
        run: cargo build --release -p archergate-license --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/archergate-license${{ matrix.ext }} staging/
          if [ -f include/archergate_license.h ]; then
            cp include/archergate_license.h staging/
          fi
          if [ -f README.md ]; then
            cp README.md staging/
          fi
          cd staging
          tar czf ../${{ matrix.archive }}.tar.gz *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/archergate-license${{ matrix.ext }} staging/
          if [ -f include/archergate_license.h ]; then
            cp include/archergate_license.h staging/
          fi
          if [ -f README.md ]; then
            cp README.md staging/
          fi
          cd staging
          tar czf ../${{ matrix.archive }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}.tar.gz

  universal-macos:
    name: macOS Universal Binary
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: archergate-license-macos-x86_64
          path: artifacts/x86_64

      - name: Download aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: archergate-license-macos-aarch64
          path: artifacts/aarch64

      - name: Extract and create universal binary
        run: |
          mkdir -p extract/x86_64 extract/aarch64 staging
          tar xzf artifacts/x86_64/archergate-license-macos-x86_64.tar.gz -C extract/x86_64
          tar xzf artifacts/aarch64/archergate-license-macos-aarch64.tar.gz -C extract/aarch64
          lipo -create \
            extract/x86_64/archergate-license \
            extract/aarch64/archergate-license \
            -output staging/archergate-license
          if [ -f extract/x86_64/archergate_license.h ]; then
            cp extract/x86_64/archergate_license.h staging/
          fi
          if [ -f extract/x86_64/README.md ]; then
            cp extract/x86_64/README.md staging/
          fi
          cd staging
          tar czf ../archergate-license-macos-universal.tar.gz *

      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: archergate-license-macos-universal
          path: archergate-license-macos-universal.tar.gz

  release:
    name: Create Release
    needs: [build, universal-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          cd release
          sha256sum *.tar.gz > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/SHA256SUMS
