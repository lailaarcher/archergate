[package]
name = "tauri-plugin-archergate"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Tauri plugin for machine-bound software licensing via Archergate"
repository = "https://github.com/lailaarcher/archergate"
keywords = ["tauri", "plugin", "license", "archergate", "copy-protection"]

[dependencies]
tauri = { version = "2", features = ["plugin"] }
archergate-license = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
thiserror = "2"
